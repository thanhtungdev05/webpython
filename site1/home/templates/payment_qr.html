{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3 fw-bold">Thanh toán Tour #{{ booking.id }}</h3>
        <p class="text-center text-muted">
            Vui lòng nhập thông tin trước khi thanh toán qua QR Code
        </p>

        <!-- FORM THÔNG TIN -->
        <form id="customerForm">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Họ và tên</label>
        <input type="text" id="fullName" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text" id="phone" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <!-- Thông tin bổ sung -->
    <div class="mb-3">
        <label class="form-label">Nơi ở hiện tại</label>
        <input type="text" id="address" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Ngày sinh</label>
        <input type="date" id="birthDate" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Số CCCD</label>
        <input type="text" id="cccd" class="form-control" required>
    </div>

    <button type="button" onclick="showQR()" class="btn btn-primary w-100">
        Xác nhận thông tin
    </button>
</form>

        <!-- QR SECTION -->
        <div id="qrSection" class="text-center" style="display:none;">
            <p class="mt-3"><strong>Số tiền:</strong>
                <span id="amountText">{{ amount }}</span> ₫
            </p>

            <img id="qrImg" class="img-fluid my-3 rounded shadow"
                 style="max-width: 280px; background: white; padding: 10px; border: 2px solid #0d6efd;">

            <p class="text-muted">💡 Sau khi chuyển khoản, vui lòng bấm "Tôi đã chuyển khoản" để xác nhận!</p>

            <button id="paidBtn" class="btn btn-success w-50">Tôi đã chuyển khoản</button>

            <div id="statusMessage" class="mt-3 text-info fw-bold" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // Format số tiền VND
    function formatVND(num) {
        return Number(num).toLocaleString('vi-VN');
    }

    document.addEventListener("DOMContentLoaded", () => {
        const amountElem = document.getElementById("amountText");
        let raw = parseFloat(amountElem.textContent);
        amountElem.textContent = formatVND(raw);
    });

    // Hiển thị QR
function showQR() {
    const fullName = document.getElementById("fullName").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const address = document.getElementById("address").value;
    const birthDate = document.getElementById("birthDate").value;
    const cccd = document.getElementById("cccd").value;

    // Validate đơn giản
    if(!fullName || !phone || !email || !address || !birthDate || !cccd) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    // Cập nhật thông tin khách vào server trước khi hiển thị QR
    fetch("{% url 'update_customer_info' booking.id %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            full_name: fullName,
            phone: phone,
            email: email,
            address: address,
            birth_date: birthDate,
            cccd: cccd
        })
    }).then(res => res.json()).then(data => {
        if(data.success) {
            // Hiển thị QR
            document.getElementById("customerForm").style.display = "none";
            document.getElementById("qrSection").style.display = "block";

            let amount = "{{ amount }}";
            let bookingId = "{{ booking.id }}";
            let qrUrl = `https://img.vietqr.io/image/970415-1234567890-compact.png?amount=${amount}&addInfo=ThanhToanTour${bookingId}`;
            document.getElementById("qrImg").src = qrUrl;
        } else {
            alert("Cập nhật thông tin khách thất bại!");
        }
    });
}

    // Xác nhận thanh toán
document.getElementById("paidBtn").addEventListener("click", () => {
    const statusMsg = document.getElementById("statusMessage");
    statusMsg.style.display = "block";

    let countdown = 10;
    statusMsg.textContent = `Đang chờ xác nhận (${countdown}s)...`;

    // AJAX cập nhật status
    fetch("{% url 'update_booking_status' booking.id %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({status: "Đã thanh toán"})
    });

    // Đếm ngược 10s trước khi chuyển trang
    const interval = setInterval(() => {
        countdown--;
        statusMsg.textContent = `Đang chờ xác nhận (${countdown}s)...`;
        if (countdown <= 0) {
            clearInterval(interval);
            window.location.href = "/profile/";
        }
    }, 1000);
});
</script>

<style>
    #customerForm input:focus {
        box-shadow: 0 0 5px #0d6efd;
        border-color: #0d6efd;
    }

    #paidBtn:hover {
        transform: scale(1.05);
        transition: 0.2s;
    }

    #qrSection img {
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
</style>
{% endblock %}
